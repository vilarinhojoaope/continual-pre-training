model_name: "unsloth/Qwen2.5-1.5B-bnb-4bit"
output_dir: "/content/drive/MyDrive/topicos_em_ia_final/data_model_treinamento_continuado/qwen-dompi-cpt"

data_path: "data/dompi/train.jsonl"
text_column: "text"

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

max_seq_length: 1024
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2e-4
max_steps: 300
warmup_steps: 50
weight_decay: 0.01
lr_scheduler_type: "cosine"
fp16: true
bf16: false
seed: 42
logging_steps: 10
save_steps: 100