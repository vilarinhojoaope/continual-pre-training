model_name: "unsloth/Qwen2.5-1.5B-bnb-4bit"
output_dir: "/content/drive/MyDrive/topicos_em_ia_final/data_model_treinamento_continuado/qwen-dompi-cpt"

data_path: "data/dompi/train.jsonl"
text_column: "text"

lora_r: 16
lora_alpha: 32
lora_dropout: 0.0
target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

max_seq_length: 2048
per_device_train_batch_size: 4
gradient_accumulation_steps: 2
learning_rate: 2e-4
max_steps: 3000
warmup_steps: 200
weight_decay: 0.01
lr_scheduler_type: "cosine"
fp16: false
bf16: true
seed: 42
logging_steps: 50
save_steps: 500